name: Supabase Keepalive

# Supabase free pauses projects after ~7 days without DB activity. A daily
# REST call against any table is enough to count as activity and keep the
# project warm. Off-the-hour cron to avoid contention with other workflows.
on:
  schedule:
    - cron: '23 11 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: GET /rest/v1/distances?limit=1
        run: |
          curl -fsS --max-time 30 \
            "${{ vars.VITE_SUPABASE_URL }}/rest/v1/distances?select=id&limit=1" \
            -H "apikey: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}"
