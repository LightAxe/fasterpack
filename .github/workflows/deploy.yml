name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      # PWA service worker + manifest must NEVER be long-cached or the app
      # gets stuck on a stale version. index.html references hashed asset
      # URLs, so it must also be short-cached. Two-pass sync keeps the
      # immutable assets long-cached and the shell + PWA files fresh.
      - name: Sync to S3 (long-cache assets)
        run: |
          aws s3 sync ./dist "s3://${{ vars.SITE_BUCKET_NAME }}" --delete \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "*.txt" \
            --exclude "sw.js" \
            --exclude "workbox-*.js" \
            --exclude "manifest.webmanifest" \
            --exclude "registerSW.js" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync to S3 (short-cache shell + PWA + crawler files)
        run: |
          aws s3 sync ./dist "s3://${{ vars.SITE_BUCKET_NAME }}" --delete \
            --exclude "*" \
            --include "*.html" \
            --include "*.xml" \
            --include "*.txt" \
            --include "sw.js" \
            --include "workbox-*.js" \
            --include "manifest.webmanifest" \
            --include "registerSW.js" \
            --cache-control "public, max-age=60, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
